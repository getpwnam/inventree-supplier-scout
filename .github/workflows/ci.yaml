# Ensure that the plugin meets the required style guidelines
# Ensure that the plugin builds correctly

name: CI Checks

on: ["push", "pull_request"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      COVERAGE_MIN: "50"
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11
      - name: Install Deps
        run: |
          pip install -U ruff
          pip install -U coverage
          pip install -U wheel setuptools twine build
      - name: Style Checks
        run: |
          ruff check
      - name: Backend Translation Checks
        run: |
          python .github/scripts/check_backend_translations.py
      - name: Unit Tests (Coverage)
        run: |
          coverage run -m unittest discover -s supplier_scout -p "test_*.py"
          coverage report -m --fail-under=${COVERAGE_MIN}
          coverage xml
      - name: Upload Coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true
      - name: Skip Codecov Upload (No Token)
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: |
          echo "CODECOV_TOKEN is not configured; skipping Codecov upload."
          echo "Coverage gate is still enforced via coverage report --fail-under=${COVERAGE_MIN}."
      - name: Build Plugin
        run: |
          python -m build
  
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci
      - name: Build Frontend
        run: |
          cd frontend
          npm run translate
          npm run build
          npm run lint