#This file is used to package the SupplierScout plugin.
#
#- It was generated by the InvenTree Plugin Creator tool - version 1.18.1
#- Ref: https://github.com/inventree/plugin_creator

[build-system]
requires = ["setuptools", "twine", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "inventree-supplier-scout"
description = "Part search, matching and ordering with popular suppliers"
dynamic = ["version"]
authors = [
    { name = "Charles Price",email = "cp@evilbit.co.uk" },
]
readme = "README.md"
license = "MIT"
keywords = ["inventree", "plugin"]
requires-python = ">=3.9"
dependencies = [
    # Enter your plugin library dependencies here
]
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: OS Independent",
    "Framework :: InvenTree",
]
[project.urls]
Homepage = "https://github.com/getpwnam/inventree-supplier-scout"

[project.entry-points."inventree_plugins"]
SupplierScout = "supplier_scout.core:SupplierScout"

[tool.setuptools.packages.find]
where = [""]

[tool.setuptools.dynamic]
version = {attr = "supplier_scout.PLUGIN_VERSION"} 

[tool.ruff]
exclude = [
    ".git",
    "__pycache__",
    "test.py",
    "tests",
    "venv",
    "env",
    ".venv",
    ".env",
]

src=["supplier_scout"]
